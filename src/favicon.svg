<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calendar background -->
  <rect x="10" y="15" width="80" height="75" rx="8" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>
  
  <!-- Calendar header (dark bar) -->
  <rect x="10" y="15" width="80" height="18" rx="8" fill="#2E5C8A"/>
  <rect x="10" y="25" width="80" height="8" fill="#2E5C8A"/>
  
  <!-- Binding rings -->
  <circle cx="25" cy="20" r="3" fill="#E8F4F8" stroke="#2E5C8A" stroke-width="1.5"/>
  <circle cx="50" cy="20" r="3" fill="#E8F4F8" stroke="#2E5C8A" stroke-width="1.5"/>
  <circle cx="75" cy="20" r="3" fill="#E8F4F8" stroke="#2E5C8A" stroke-width="1.5"/>
  
  <!-- Calendar grid lines -->
  <line x1="18" y1="44" x2="82" y2="44" stroke="#2E5C8A" stroke-width="1" opacity="0.3"/>
  <line x1="18" y1="57" x2="82" y2="57" stroke="#2E5C8A" stroke-width="1" opacity="0.3"/>
  <line x1="18" y1="70" x2="82" y2="70" stroke="#2E5C8A" stroke-width="1" opacity="0.3"/>
  
  <line x1="32" y1="37" x2="32" y2="85" stroke="#2E5C8A" stroke-width="1" opacity="0.3"/>
  <line x1="45" y1="37" x2="45" y2="85" stroke="#2E5C8A" stroke-width="1" opacity="0.3"/>
  <line x1="58" y1="37" x2="58" y2="85" stroke="#2E5C8A" stroke-width="1" opacity="0.3"/>
  <line x1="71" y1="37" x2="71" y2="85" stroke="#2E5C8A" stroke-width="1" opacity="0.3"/>
  
  <!-- Highlight today (centered date) -->
  <rect x="45.5" y="57.5" width="11" height="11" rx="2" fill="#FF6B6B"/>
  
  <!-- Small date dots for other days -->
  <circle cx="21" cy="50" r="1.5" fill="#E8F4F8"/>
  <circle cx="38" cy="50" r="1.5" fill="#E8F4F8"/>
  <circle cx="64" cy="50" r="1.5" fill="#E8F4F8"/>
  <circle cx="77" cy="50" r="1.5" fill="#E8F4F8"/>
  
  <circle cx="21" cy="63" r="1.5" fill="#E8F4F8"/>
  <circle cx="38" cy="63" r="1.5" fill="#E8F4F8"/>
  <circle cx="64" cy="63" r="1.5" fill="#E8F4F8"/>
  <circle cx="77" cy="63" r="1.5" fill="#E8F4F8"/>
  
  <circle cx="21" cy="76" r="1.5" fill="#E8F4F8"/>
  <circle cx="38" cy="76" r="1.5" fill="#E8F4F8"/>
  <circle cx="51" cy="76" r="1.5" fill="#E8F4F8"/>
  <circle cx="64" cy="76" r="1.5" fill="#E8F4F8"/>
</svg>
